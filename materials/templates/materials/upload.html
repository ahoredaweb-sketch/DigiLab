<!DOCTYPE html>
<html>
<head>
    <title>Upload Material</title>

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1145368553393613"
crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f7fa;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #333;
        }

        .error {
            color: red;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>


<body>

<div class="container">

    <!-- SVG LOGO -->
    <svg width="600" height="145" viewBox="0 0 600 145" xmlns="http://www.w3.org/2000/svg">
  <style>
    .logo-text { font-family: Arial, Helvetica, sans-serif; font-weight: 700; font-size: 48px; }
    .tagline { font-family: Arial, Helvetica, sans-serif; font-weight: 400; font-size: 16px; fill: #1F4E79; letter-spacing: 0.5px; }
    .orange { fill: #F58220; }
    .blue { fill: #1F4E79; }
    .light-blue { fill: #4A90E2; }
    .green { fill: #7ED321; }
    .dot-teal { fill: #50E3C2; }
  </style>

  <!-- Open book base -->
  <path class="blue" d="M20 85 Q60 75 100 85 L100 95 Q60 85 20 95 Z"/>
  <path class="blue" d="M100 85 Q140 75 180 85 L180 95 Q140 85 100 95 Z"/>
  <path class="blue" d="M15 90 L185 90 L182 98 L18 98 Z"/>

  <!-- Left document - orange -->
  <rect class="orange" x="45" y="45" width="20" height="28" rx="2"/>
  <rect fill="white" x="50" y="50" width="10" height="2"/>
  <rect fill="white" x="50" y="55" width="10" height="2"/>
  <rect fill="white" x="50" y="60" width="7" height="2"/>

  <!-- Center screen - blue -->
  <rect class="light-blue" x="75" y="38" width="32" height="35" rx="3"/>
  <rect class="blue" x="79" y="42" width="24" height="16" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
  <circle fill="white" cx="91" cy="50" r="4"/>
  <path fill="white" d="M88 48 L91 53 L96 46" stroke="white" stroke-width="1.5" fill="none"/>
  <rect class="blue" x="85" y="73" width="12" height="3" rx="1"/>
  <rect class="blue" x="80" y="76" width="22" height="2" rx="1"/>

  <!-- Right document - green with checkmark -->
  <rect class="light-blue" x="115" y="45" width="20" height="28" rx="2"/>
  <circle class="green" cx="125" cy="55" r="6"/>
  <path fill="white" d="M122 55 L124.5 57.5 L128 54" stroke="white" stroke-width="1.5" fill="none"/>
  <rect fill="white" x="120" y="64" width="10" height="2"/>
  <rect fill="white" x="120" y="69" width="7" height="2"/>

  <!-- Graduation cap -->
  <path class="blue" d="M138 35 L150 42 L138 49 L126 42 Z"/>
  <rect class="blue" x="135" y="49" width="6" height="4"/>
  <circle class="orange" cx="141" cy="53" r="1.5"/>

  <!-- Connecting arc with dots -->
  <path class="blue" d="M55 38 Q91 25 127 38" fill="none" stroke="#1F4E79" stroke-width="2"/>
  <circle class="dot-teal" cx="65" cy="33" r="2.5"/>
  <circle class="orange" cx="91" cy="28" r="3.5"/>
  <circle class="dot-teal" cx="117" cy="33" r="2.5"/>

  <!-- DigiLab text -->
  <text x="210" y="70" class="logo-text">
    <tspan fill="#1F4E79">Digi</tspan><tspan fill="#F58220">Lab</tspan>
  </text>

  <!-- Tagline - moved back by 1 letter width -->
  <text x="222" y="92" class="tagline">Share   ·   Learn   ·   Grow</text>
</svg>

    <h1>📤 Upload Material</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <label>Title</label>
        <input type="text" name="title" placeholder="Enter title" required>

        <label>Course</label>
        <input type="text" name="course" placeholder="Enter course" required>

        <label>File</label>
        <input type="file" name="file" required>

        <button type="submit">Upload</button>
    </form>

    <!-- AdSense Banner -->
    <div style="margin-top:20px; text-align:center;">
        <ins class="adsbygoogle"
            style="display:block"
            data-ad-client="ca-pub-1145368553393613"
            data-ad-slot="1234567890"
            data-ad-format="auto"
            data-full-width-responsive="true"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>


    <a href="/" class="back-link">⬅ Back Home</a>

</div>

</body>
</html>
